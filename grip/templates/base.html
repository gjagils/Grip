<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#e9eff8">
    <title>{% block title %}Grip{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v=denim4">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap">
</head>
<body>
    <header class="app-header">
        <span class="app-logo">Grip</span>
        <div style="display: flex; gap: 0.25rem;">
            <a href="/health" class="app-header-icon" title="Gezondheid">
                <span class="material-symbols-outlined">ecg_heart</span>
            </a>
            <a href="/trackers" class="app-header-icon" title="Trackers">
                <span class="material-symbols-outlined">bar_chart</span>
            </a>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <nav>
        <a href="/" class="{% if active_nav == 'dashboard' %}active{% endif %}">
            <span class="material-symbols-outlined nav-icon {% if active_nav == 'dashboard' %}filled{% endif %}">home</span>
            Home
        </a>
        <a href="/checkin" class="{% if active_nav == 'checkin' %}active{% endif %}">
            <span class="material-symbols-outlined nav-icon {% if active_nav == 'checkin' %}filled{% endif %}">fact_check</span>
            Check-in
        </a>
        <a href="/goals" class="{% if active_nav == 'goals' %}active{% endif %}">
            <span class="material-symbols-outlined nav-icon {% if active_nav == 'goals' %}filled{% endif %}">track_changes</span>
            Doelen
        </a>
        <a href="/chat" class="{% if active_nav == 'chat' %}active{% endif %}">
            <span class="material-symbols-outlined nav-icon {% if active_nav == 'chat' %}filled{% endif %}">psychology</span>
            Coach
        </a>
        <a href="/quarterly" class="{% if active_nav == 'quarterly' %}active{% endif %}">
            <span class="material-symbols-outlined nav-icon {% if active_nav == 'quarterly' %}filled{% endif %}">calendar_view_month</span>
            Kwartaal
        </a>
    </nav>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
