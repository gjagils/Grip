services:
  grip:
    image: ghcr.io/gjagils/grip:latest
    container_name: grip
    restart: unless-stopped
    ports:
      - "8921:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HEALTH_SYNC_TOKEN=${HEALTH_SYNC_TOKEN}
      - NTFY_URL=${NTFY_URL}
      - NTFY_TOKEN=${NTFY_TOKEN}
      - WATCHDOG_HOUR=${WATCHDOG_HOUR}
    volumes:
      - grip-data:/data

volumes:
  grip-data:
